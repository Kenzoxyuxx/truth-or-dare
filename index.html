<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SPIN • Kejujuran atau Tantangan</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --neon-orange: #ff6600;
            --neon-red: #ff0066;
            --neon-purple: #bb00ff;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0514;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        canvas#particles { position: absolute; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }

        .screen { position: absolute; inset: 0; display: none; flex-direction: column; z-index: 10; }

        /* INTRO */
        #intro-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 30%, #2a0a3d, #0a0514);
        }

        .intro-content {
            text-align: center;
            z-index: 20;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 58px;
            font-weight: 900;
            background: linear-gradient(90deg, #ff6600, #ff0066, #bb00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(187,0,255,0.7);
            margin-bottom: 8px;
        }

        .mode-container {
            display: flex;
            gap: 35px;
            margin-top: 70px;
        }

        .mode-card {
            width: 280px;
            padding: 45px 30px;
            background: rgba(25,10,45,0.75);
            border: 3px solid transparent;
            border-radius: 28px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
            backdrop-filter: blur(16px);
        }

        .mode-card:hover {
            transform: translateY(-12px) scale(1.06);
            box-shadow: 0 0 70px currentColor;
        }

        .online-card { border-color: var(--neon-purple); }
        .offline-card { border-color: var(--neon-orange); }

        /* SETUP SCREEN */
        #setup-screen {
            padding: 40px;
        }

        .glass {
            background: rgba(20,10,45,0.85);
            border: 2px solid var(--neon-purple);
            border-radius: 24px;
            padding: 35px;
            max-width: 560px;
            margin: 0 auto;
        }

        /* GAME */
        #game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-left: 280px;
        }

        #player-panel {
            position: absolute;
            left: 25px;
            top: 100px;
            bottom: 25px;
            width: 240px;
            background: rgba(20,10,45,0.9);
            border-radius: 22px;
            padding: 20px;
            overflow-y: auto;
            border: 2px solid rgba(187,0,255,0.25);
            z-index: 50;
        }

        .player-card {
            background: rgba(255,255,255,0.07);
            padding: 14px 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .player-card:hover { background: rgba(255,102,0,0.15); transform: scale(1.03); }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-red));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .wheel-wrapper {
            position: relative;
            width: 480px;
            height: 480px;
        }

        #roulette-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            filter: drop-shadow(0 0 80px var(--neon-purple));
        }

        .pointer {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 85px solid #ff0066;
            filter: drop-shadow(0 0 25px #ff0066);
            z-index: 30;
        }

        /* Modals */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(5,2,18,0.96);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: linear-gradient(145deg, #2a103f, #150822);
            border: 5px solid var(--neon-purple);
            border-radius: 32px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 0 120px var(--neon-purple);
        }

        .big-name {
            font-size: 62px;
            font-weight: 900;
            margin: 25px 0;
            text-shadow: 0 0 30px currentColor;
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <!-- INTRO SCREEN -->
    <div id="intro-screen" class="screen">
        <div class="intro-content">
            <div class="main-title">NEON SPIN</div>
            <h2 style="font-size: 28px; color: #ddd; margin-bottom: 60px;">Kejujuran atau Tantangan</h2>
            
            <div class="mode-container">
                <div class="mode-card online-card" onclick="selectMode('online')">
                    <h2 style="font-size:32px;">🌐 ONLINE</h2>
                    <p style="opacity:0.85;">LDR • Video Call • Chat Challenge</p>
                </div>
                <div class="mode-card offline-card" onclick="selectMode('offline')">
                    <h2 style="font-size:32px;">🎉 OFFLINE</h2>
                    <p style="opacity:0.85;">Party • Bertemu Langsung</p>
                </div>
            </div>
        </div>
    </div>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="screen">
        <div style="text-align:center; margin:30px 0;">
            <h1 style="font-size:34px;">Siapkan Pemainmu</h1>
            <p id="mode-info" style="color:#aaa; margin-top:8px;"></p>
        </div>

        <div class="glass">
            <input type="text" id="new-player" placeholder="Masukkan nama pemain..." 
                   style="width:100%; padding:18px; background:#1a0f2e; border:2px solid #8800cc; border-radius:18px; color:white; font-size:17px;">
            <button onclick="addPlayer()" 
                    style="width:100%; margin-top:15px; padding:18px; background:linear-gradient(90deg,#bb00ff,#ff0066); border:none; border-radius:18px; font-size:18px; font-weight:700;">
                TAMBAH PEMAIN
            </button>
        </div>

        <div id="player-list-setup" style="margin:30px auto; max-width:560px; display:flex; flex-wrap:wrap; gap:12px; justify-content:center;"></div>

        <div style="text-align:center; margin-top:40px;">
            <button onclick="startGame()" 
                    style="padding:20px 90px; font-size:26px; background:linear-gradient(90deg,#ff6600,#ff0066); border:none; border-radius:60px; font-weight:900; box-shadow:0 0 40px #ff0066;">
                MULAI PERMAINAN
            </button>
            <button onclick="resetAllPlayers()" 
                    style="margin-left:15px; padding:12px 25px; background:#330011; color:#ff99aa; border:1px solid #660022; border-radius:50px;">
                Reset Semua
            </button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <!-- Player Panel -->
        <div id="player-panel">
            <h3 style="text-align:center; color:var(--neon-purple); margin-bottom:20px;">DAFTAR PEMAIN</h3>
            <div id="sidebar-players" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>

        <div class="wheel-wrapper">
            <canvas id="roulette-canvas" width="480" height="480"></canvas>
            <div class="pointer"></div>
        </div>

        <button id="spin-btn" onclick="spinWheel()" 
                style="margin-top:20px; padding:20px 110px; font-size:28px; background:linear-gradient(90deg,#ff6600,#ff0066); border:none; border-radius:60px; font-weight:900;">
            PUTAR ROULETTE
        </button>
    </div>

    <!-- Modals -->
    <div id="first-modal" class="modal">
        <div class="modal-content">
            <p style="color:#aaa; font-size:18px;">PEMAIN TERPILIH</p>
            <div id="first-name" class="big-name" style="color:#ffcc00;"></div>
            <div style="display:flex; gap:25px; margin-top:45px;">
                <button onclick="chooseType('kejujuran')" style="flex:1; padding:45px 20px; background:linear-gradient(#ff8800,#ff5500); border:none; border-radius:22px; font-size:28px; font-weight:900;">KEJUJURAN</button>
                <button onclick="chooseType('tantangan')" style="flex:1; padding:45px 20px; background:linear-gradient(#ff0066,#cc0033); border:none; border-radius:22px; font-size:28px; font-weight:900;">TANTANGAN</button>
            </div>
        </div>
    </div>

    <div id="final-modal" class="modal">
        <div class="modal-content">
            <div id="final-header" style="font-size:24px; margin-bottom:15px;"></div>
            <div id="challenge-text" style="font-size:23px; line-height:1.7; padding:30px; background:rgba(0,0,0,0.4); border-radius:20px; margin:25px 0;"></div>
            <button onclick="nextRound()" style="width:100%; padding:20px; background:linear-gradient(#bb00ff,#ff0066); border:none; border-radius:20px; font-size:22px; font-weight:700;">MAIN LAGI</button>
        </div>
    </div>

    <script>
        let currentMode = '';
        let players = [];
        let rotation = 0, velocity = 0, isSpinning = false;
        let targetPlayer = '', giverPlayer = '', challengeType = '';
        let currentWheelPlayers = [];

        const canvas = document.getElementById('roulette-canvas');
        const ctx = canvas.getContext('2d');
        const center = 240;

        // Questions
        const onlineTruths = ["Siapa yang paling sering kamu pikirkan akhir-akhir ini?", "Pernah screenshot chat seseorang diam-diam?", "Apa rahasia terbesar yang kamu simpan di HP?"];
        const onlineDares = ["Kirim voice note nyanyi lagu romantis ke grup chat", "Upload story dengan emoji hati selama 10 menit", "Kirim foto selfie sekarang ke kontak terakhir"];
        
        const offlineTruths = ["Siapa yang paling ngeselin di ruangan ini?", "Hal paling memalukan yang pernah kamu lakukan?", "Kapan terakhir kali kamu bohong ke orang tua?"];
        const offlineDares = ["Joget 20 detik tanpa musik", "Tirukan suara hewan selama 15 detik", "Puji orang di sebelahmu secara berlebihan"];

        function selectMode(mode) {
            currentMode = mode;
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'flex';
            document.getElementById('mode-info').textContent = mode === 'online' ? '🌐 MODE ONLINE (LDR)' : '🎉 MODE OFFLINE (Party)';
            loadPlayers();
        }

        function loadPlayers() {
            try {
                const saved = localStorage.getItem('neonSpinPlayers');
                if (saved) players = JSON.parse(saved);
            } catch(e) {}
            if (players.length === 0) players = ["Andi", "Budi", "Citra", "Dina"];
            renderPlayers();
        }

        function savePlayers() {
            try { localStorage.setItem('neonSpinPlayers', JSON.stringify(players)); } catch(e) {}
        }

        function renderPlayers() {
            // Sidebar
            const sidebar = document.getElementById('sidebar-players');
            sidebar.innerHTML = '';
            players.forEach(p => {
                const div = document.createElement('div');
                div.className = 'player-card';
                div.innerHTML = `<div class="avatar">${p[0]}</div><div>${p}</div>`;
                sidebar.appendChild(div);
            });

            // Setup list
            const container = document.getElementById('player-list-setup');
            container.innerHTML = '';
            players.forEach((p, i) => {
                const d = document.createElement('div');
                d.style.cssText = 'background:rgba(255,255,255,0.1); padding:14px 22px; border-radius:18px; display:flex; align-items:center; gap:15px;';
                d.innerHTML = `${p} <button onclick="removePlayer(${i})" style="margin-left:auto; background:#440022; color:#ff99aa; border:none; width:32px; height:32px; border-radius:50%; cursor:pointer;">×</button>`;
                container.appendChild(d);
            });
        }

        function addPlayer() {
            const input = document.getElementById('new-player');
            if (input.value.trim()) {
                players.push(input.value.trim());
                savePlayers();
                renderPlayers();
                input.value = '';
            }
        }

        function removePlayer(i) {
            players.splice(i, 1);
            savePlayers();
            renderPlayers();
        }

        function resetAllPlayers() {
            if (confirm("Hapus semua pemain?")) {
                players = [];
                savePlayers();
                renderPlayers();
            }
        }

        function startGame() {
            if (players.length < 2) return alert("Minimal 2 pemain dibutuhkan!");
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            initWheel();
        }

        function initWheel() {
            currentWheelPlayers = [...players];
            drawWheel();
        }

        function drawWheel() {
            ctx.clearRect(0, 0, 480, 480);
            const slice = (Math.PI * 2) / currentWheelPlayers.length;

            for (let i = 0; i < currentWheelPlayers.length; i++) {
                const ang = rotation + i * slice;
                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.arc(center, center, 215, ang, ang + slice);
                ctx.fillStyle = i % 2 === 0 ? '#7700bb' : '#dd00ff';
                ctx.fill();

                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(ang + slice / 2);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 21px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillText(currentWheelPlayers[i].substring(0, 10), 0, -92);
                ctx.restore();
            }
        }

        function animateWheel() {
            if (Math.abs(velocity) > 0.001) {
                rotation += velocity;
                velocity *= 0.974;
                drawWheel();
                requestAnimationFrame(animateWheel);
            }
        }

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            velocity = 0.48 + Math.random() * 0.55;
            document.getElementById('spin-btn').disabled = true;

            setTimeout(() => {
                velocity *= 0.2;
                setTimeout(() => {
                    isSpinning = false;
                    const idx = Math.floor(Math.random() * currentWheelPlayers.length);
                    targetPlayer = currentWheelPlayers[idx];
                    document.getElementById('first-name').textContent = targetPlayer;
                    document.getElementById('first-modal').style.display = 'flex';
                }, 1100);
            }, 2600);

            animateWheel();
        }

        function chooseType(type) {
            challengeType = type;
            document.getElementById('first-modal').style.display = 'none';

            currentWheelPlayers = players.filter(p => p !== targetPlayer);
            if (currentWheelPlayers.length === 0) currentWheelPlayers = [...players];
            initWheel();

            setTimeout(() => {
                velocity = 0.42 + Math.random() * 0.45;
                isSpinning = true;
                animateWheel();

                setTimeout(() => {
                    isSpinning = false;
                    const idx = Math.floor(Math.random() * currentWheelPlayers.length);
                    giverPlayer = currentWheelPlayers[idx];
                    showFinal();
                }, 2400);
            }, 800);
        }

        function showFinal() {
            const qList = currentMode === 'online' ? 
                (challengeType === 'kejujuran' ? onlineTruths : onlineDares) :
                (challengeType === 'kejujuran' ? offlineTruths : offlineDares);
            
            const challenge = qList[Math.floor(Math.random() * qList.length)];

            document.getElementById('final-header').innerHTML = `${targetPlayer} <span style="color:#aaa">dari</span> ${giverPlayer}`;
            document.getElementById('challenge-text').innerHTML = `<strong>${challengeType.toUpperCase()}:</strong><br><br>${challenge}`;
            document.getElementById('final-modal').style.display = 'flex';
        }

        function nextRound() {
            document.getElementById('final-modal').style.display = 'none';
            document.getElementById('spin-btn').disabled = false;
            initWheel();
        }

        function initParticles() {
            const c = document.getElementById('particles');
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            const pctx = c.getContext('2d');
            let ps = [];
            for (let i = 0; i < 200; i++) {
                ps.push({x: Math.random()*c.width, y: Math.random()*c.height, s: Math.random()*3+1, sp: Math.random()*0.8+0.3});
            }
            function loop() {
                pctx.fillStyle = 'rgba(10,5,25,0.13)';
                pctx.fillRect(0,0,c.width,c.height);
                ps.forEach(p => {
                    p.y += p.sp;
                    if (p.y > c.height) p.y = 0;
                    pctx.fillStyle = 'rgba(187,0,255,0.45)';
                    pctx.fillRect(p.x, p.y, p.s, p.s);
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        window.onload = () => {
            initParticles();
            document.getElementById('intro-screen').style.display = 'flex';
        };
    </script>
</body>
  </html>
